name: integrated-redundancy

topology:
  nodes:
    # R1: 純粋なルーター（L3のみ）。type指定なし = ルーターモードで起動
    r1:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:15.7.3M2

    # SW1/SW2: L3スイッチ（L2+L3の両方が必要）。type: l2 で起動
    sw1:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:L2-advipservices-2017
      type: l2
    sw2:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:L2-advipservices-2017
      type: l2

    # SW3: 純粋なL2スイッチ
    sw3:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:L2-15.2
      type: l2

    # PC1: 検証用エンドホスト（L2スイッチイメージで代用）
    pc1:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:L2-15.2
      type: l2

  links:
    # R1 (Internet/Core) to Distribution Switches
    - endpoints: ["r1:eth1", "sw1:eth1"]
    - endpoints: ["r1:eth2", "sw2:eth1"]

    # Distribution Switches to Access Switch
    - endpoints: ["sw1:eth2", "sw3:eth1"]
    - endpoints: ["sw2:eth2", "sw3:eth2"]

    # Access Switch to End Host
    - endpoints: ["sw3:eth3", "pc1:eth1"]
