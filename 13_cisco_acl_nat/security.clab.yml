name: acl-nat-security

topology:
  nodes:
    # クライアントPC群（ルーターイメージを使ってホストとして振る舞わせる）
    pc1:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:15.7.3M2
    pc2:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:15.7.3M2

    # アクセススイッチ
    sw1:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:L2-advipservices-2017
      type: l2

    # 境界エッジルーター（NAT / ACL を実施）
    r1:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:15.7.3M2

    # 外部インターネットサーバー
    srv1:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:15.7.3M2

  links:
    - endpoints: ["pc1:eth1", "sw1:eth1"]
    - endpoints: ["pc2:eth1", "sw1:eth2"]
    - endpoints: ["sw1:eth3", "r1:eth1"]
    - endpoints: ["r1:eth2", "srv1:eth1"]
