# 実測デバイスナレッジ (2026-07-17 イメージ可用性検証で確定)
# 出典: 環境/イメージ可用性検証_2026-07-17.md / results/results.tsv
devices:
  routeros:
    image: vrnetlab/mikrotik_routeros:7.5
    access: [ssh, rest]
    credentials: {user: admin, pass: admin}
    rest:
      scheme: https
      note: "7.5は/restがwww-ssl(自己署名証明書要作成)のみ。loインターフェース無し→ip address追加はether1宛て"
    boot_seconds: 90
    verdict: FULL
    quirks:
      - "QEMU_CPU=max必須(全VM型共通)"

  chr7214:
    image: vrnetlab/mikrotik_routeros:7.21.4
    access: [ssh, rest]
    credentials: {user: admin, pass: admin}
    rest:
      scheme: http
      note: "restはhttp可"
    boot_seconds: 108
    verdict: FULL
    quirks:
      - "restはhttp可"
      - "loあり"
      - "ビルドはDOCKER_DEFAULT_PLATFORM=linux/amd64必須"

  nxos:
    image: vrnetlab/cisco_nxostitanium:7.3.0.D1.1
    access: [ssh]
    credentials: {user: admin, pass: admin}
    boot_seconds: 967
    verdict: FULL
    quirks:
      - "clab kindなし→docker run --privileged直起動"
      - "仕様書はNX-OS 10.5で7.3と版差あり"

  asav:
    image: vrnetlab/cisco_asav:9-18-1
    access: [ssh]
    credentials: {user: admin, pass: "CiscoAsa1!"}
    credentials_note: "bootstrapがASAパスワード複雑性要件のためadminを拒否しCiscoAsa1!を設定(launch.py L16 ENABLE_PASSWORD)"
    boot_seconds: {min: 900, max: 1030}
    verdict: pending
    verdict_note: "検証中(RAM増量後に単独再検証予定)"
    quirks:
      - "並列実行時のRAM枯渇でタイムアウト多発"

  fortios:
    image: vrnetlab/fortinet_fortios:7.4.2.F
    access: [console]
    credentials: {user: admin, pass: admin}
    credentials_note: "bootstrap投入は完走"
    boot_seconds: 331
    boot_note: "Startup complete 5m31s"
    verdict: BOOT_ONLY
    quirks:
      - "ゲスト管理IF(10.0.0.15)がqemuユーザーネット転送に応答せずSSH/HTTPSはbanner timeout"
      - "console(telnet :5000)は生存"

  vios:
    image: vrnetlab/cisco_vios:159-3.M6
    access: [console]
    boot_seconds: 120
    boot_note: "IOS起動"
    verdict: BOOT_ONLY
    quirks:
      - "SSH不可=bootstrap層(vrnetlab/scrapli)の問題でIOS自体は正常"
      - "vrnetlab bootstrap(scrapli)が完走せずhealthy未達"
      - "コンソール手動運用のみ"

  viosl2:
    image: vrnetlab/cisco_vios:L2-20200929
    access: [console]
    boot_seconds: 120
    boot_note: "IOS起動"
    verdict: BOOT_ONLY
    quirks:
      - "SSH不可=bootstrap層(vrnetlab/scrapli)の問題でIOS自体は正常"
      - "vrnetlab bootstrap(scrapli)が完走せずhealthy未達"
      - "コンソール手動運用のみ"

  veos:
    image: vrnetlab/arista_veos:4.29.2F
    access: []
    verdict: NG
    quirks:
      - "起動ドライバが『To many spins with no result, restarting』の5秒間隔無限再起動ループ"
      - "KVM環境なら動作する可能性"
      - "代替: Arista cEOS arm64(無償アカウントDL)"

  iol-1563:
    image: vrnetlab/cisco_iol:15.6.3M3a
    access: [console]
    boot_seconds: 96
    verdict: BOOT_ONLY
    quirks:
      - "GNS3世代IOLはstartup-configからRSA鍵生成不可→SSH不可"
      - "既存ラボ同様docker attach運用"
      - "IOURCライセンスbind必須(/opt/clab/.iourc)"

  iol-l2152:
    image: vrnetlab/cisco_iol:L2-15.2
    access: [console]
    boot_seconds: 96
    verdict: BOOT_ONLY
    quirks:
      - "GNS3世代IOLはstartup-configからRSA鍵生成不可→SSH不可"
      - "既存ラボ同様docker attach運用"
      - "IOURCライセンスbind必須(/opt/clab/.iourc)"

  csr17:
    image: vrnetlab/cisco_csr1000v:17.03.05
    verdict: pending
    quirks:
      - "IOS-XE 17.3.5ブート到達実績あり"
      - "90分でbootstrap未完(RAM枯渇域)"

  csr16:
    image: vrnetlab/cisco_csr1000v:16.12.05
    verdict: pending

  c8000v:
    image: vrnetlab/cisco_c8000v:17.06.03
    verdict: pending

  c8000v-ctrl:
    image: vrnetlab/cisco_c8000v:controller-17.06.03
    verdict: pending

  vsrx:
    image: vrnetlab/juniper_vsrx:24.4R1.9
    verdict: pending
    credentials_candidate: {user: admin, pass: "admin@123"}

  c9800cl:
    image: vrnetlab/cisco_c9800cl:17.17.01
    verdict: pending

common_quirks:
  - "全VM型で QEMU_CPU=max 必須(KVM無し環境で -cpu host は即死)"
