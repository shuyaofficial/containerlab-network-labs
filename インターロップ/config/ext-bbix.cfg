hostname ext-bbix
no ip domain-lookup
service timestamps debug datetime msec
service timestamps log datetime msec
!
interface Loopback0
 description EXT-BBIX-PREFIX
 ip address 203.0.113.10 255.255.255.255
!
interface Ethernet0/1
 description TO-edge-n1
 ip address 198.51.100.1 255.255.255.252
 no shutdown
!
router bgp 65010
 bgp log-neighbor-changes
 network 203.0.113.10 mask 255.255.255.255
 neighbor 198.51.100.2 remote-as 290
 neighbor 198.51.100.2 description SHOWNET-AS290-edge-n1
 neighbor 198.51.100.2 default-originate
!
line vty 0 4
 exec-timeout 10 0
 transport input none
!
end
