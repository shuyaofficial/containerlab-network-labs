hostname core-n3a
no ip domain-lookup
service timestamps debug datetime msec
service timestamps log datetime msec
!
interface Loopback0
 description AS290-core-n3a
 ip address 10.90.0.31 255.255.255.255
!
interface Ethernet0/1
 description TO-edge-n1
 ip address 10.90.10.2 255.255.255.252
 no shutdown
!
interface Ethernet0/2
 description TO-edge-n2
 ip address 10.90.10.10 255.255.255.252
 no shutdown
!
interface Ethernet0/3
 description TO-core-n3b
 ip address 10.90.10.17 255.255.255.252
 no shutdown
!
interface Ethernet1/0
 description TO-transport-n4
 ip address 10.90.10.21 255.255.255.252
 no shutdown
!
interface Ethernet1/1
 description TO-monitor-ai
 ip address 10.90.60.1 255.255.255.0
 no shutdown
!
router ospf 290
 router-id 10.90.0.31
 passive-interface default
 no passive-interface Ethernet0/1
 no passive-interface Ethernet0/2
 no passive-interface Ethernet0/3
 no passive-interface Ethernet1/0
 network 10.90.0.31 0.0.0.0 area 0
 network 10.90.10.0 0.0.0.3 area 0
 network 10.90.10.8 0.0.0.3 area 0
 network 10.90.10.16 0.0.0.3 area 0
 network 10.90.10.20 0.0.0.3 area 0
 network 10.90.60.0 0.0.0.255 area 0
!
line vty 0 4
 exec-timeout 10 0
 transport input none
!
end
