hostname edge-n2
no ip domain-lookup
service timestamps debug datetime msec
service timestamps log datetime msec
!
interface Loopback0
 description AS290-edge-n2
 ip address 10.90.0.12 255.255.255.255
!
interface Ethernet0/1
 description eBGP-TO-ext-jpix
 ip address 198.51.100.6 255.255.255.252
 no shutdown
!
interface Ethernet0/2
 description TO-core-n3a
 ip address 10.90.10.9 255.255.255.252
 no shutdown
!
interface Ethernet0/3
 description TO-core-n3b
 ip address 10.90.10.13 255.255.255.252
 no shutdown
!
ip route 10.90.0.0 255.255.0.0 Null0 250
!
router ospf 290
 router-id 10.90.0.12
 passive-interface default
 no passive-interface Ethernet0/2
 no passive-interface Ethernet0/3
 network 10.90.0.12 0.0.0.0 area 0
 network 10.90.10.8 0.0.0.3 area 0
 network 10.90.10.12 0.0.0.3 area 0
 default-information originate
!
router bgp 290
 bgp log-neighbor-changes
 network 10.90.0.0 mask 255.255.0.0
 neighbor 198.51.100.5 remote-as 65020
 neighbor 198.51.100.5 description EXT-JPIX
 neighbor 10.90.0.11 remote-as 290
 neighbor 10.90.0.11 description iBGP-edge-n1
 neighbor 10.90.0.11 update-source Loopback0
 neighbor 10.90.0.11 next-hop-self
!
line vty 0 4
 exec-timeout 10 0
 transport input none
!
end
