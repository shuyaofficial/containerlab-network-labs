hostname core-n3b
no ip domain-lookup
service timestamps debug datetime msec
service timestamps log datetime msec
!
interface Loopback0
 description AS290-core-n3b
 ip address 10.90.0.32 255.255.255.255
!
interface Ethernet0/1
 description TO-edge-n1
 ip address 10.90.10.6 255.255.255.252
 no shutdown
!
interface Ethernet0/2
 description TO-edge-n2
 ip address 10.90.10.14 255.255.255.252
 no shutdown
!
interface Ethernet0/3
 description TO-core-n3a
 ip address 10.90.10.18 255.255.255.252
 no shutdown
!
interface Ethernet1/0
 description TO-transport-n4
 ip address 10.90.10.25 255.255.255.252
 no shutdown
!
interface Ethernet1/1
 description TO-sec-s4
 ip address 10.90.50.1 255.255.255.252
 no shutdown
!
router ospf 290
 router-id 10.90.0.32
 passive-interface default
 no passive-interface Ethernet0/1
 no passive-interface Ethernet0/2
 no passive-interface Ethernet0/3
 no passive-interface Ethernet1/0
 no passive-interface Ethernet1/1
 network 10.90.0.32 0.0.0.0 area 0
 network 10.90.10.4 0.0.0.3 area 0
 network 10.90.10.12 0.0.0.3 area 0
 network 10.90.10.16 0.0.0.3 area 0
 network 10.90.10.24 0.0.0.3 area 0
 network 10.90.50.0 0.0.0.3 area 0
!
line vty 0 4
 exec-timeout 10 0
 transport input none
!
end
