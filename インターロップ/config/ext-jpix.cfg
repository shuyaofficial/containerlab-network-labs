hostname ext-jpix
no ip domain-lookup
service timestamps debug datetime msec
service timestamps log datetime msec
!
interface Loopback0
 description EXT-JPIX-PREFIX
 ip address 203.0.113.20 255.255.255.255
!
interface Ethernet0/1
 description TO-edge-n2
 ip address 198.51.100.5 255.255.255.252
 no shutdown
!
router bgp 65020
 bgp log-neighbor-changes
 network 203.0.113.20 mask 255.255.255.255
 neighbor 198.51.100.6 remote-as 290
 neighbor 198.51.100.6 description SHOWNET-AS290-edge-n2
 neighbor 198.51.100.6 default-originate
!
line vty 0 4
 exec-timeout 10 0
 transport input none
!
end
