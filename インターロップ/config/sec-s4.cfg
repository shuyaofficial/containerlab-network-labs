hostname sec-s4
no ip domain-lookup
service timestamps debug datetime msec
service timestamps log datetime msec
!
interface Loopback0
 description SECURITY-DETECTION-S4
 ip address 10.90.0.54 255.255.255.255
!
interface Ethernet0/1
 description TO-core-n3b
 ip address 10.90.50.2 255.255.255.252
 no shutdown
!
interface Ethernet0/2
 description TO-remote-s5
 ip address 10.90.50.5 255.255.255.252
 ip access-group REMOTE-S5-IN in
 no shutdown
!
ip access-list extended REMOTE-S5-IN
 remark Permit remote access only to management and monitoring abstractions
 permit ip host 10.90.0.55 10.90.0.0 0.0.0.255
 permit ip host 10.90.0.55 10.90.60.0 0.0.0.255
 deny ip host 10.90.0.55 10.90.40.0 0.0.3.255 log
 permit ospf any any
 permit ip any any
!
router ospf 290
 router-id 10.90.0.54
 passive-interface default
 no passive-interface Ethernet0/1
 no passive-interface Ethernet0/2
 network 10.90.0.54 0.0.0.0 area 0
 network 10.90.50.0 0.0.0.3 area 0
 network 10.90.50.4 0.0.0.3 area 0
!
line vty 0 4
 exec-timeout 10 0
 transport input none
!
end
