hostname transport-n4
no ip domain-lookup
service timestamps debug datetime msec
service timestamps log datetime msec
!
interface Loopback0
 description AS290-transport-n4-APN-ABSTRACT
 ip address 10.90.0.41 255.255.255.255
!
interface Ethernet0/1
 description TO-core-n3a
 ip address 10.90.10.22 255.255.255.252
 no shutdown
!
interface Ethernet0/2
 description TO-core-n3b
 ip address 10.90.10.26 255.255.255.252
 no shutdown
!
interface Ethernet0/3
 description MEDIA-X-MAKUHARI
 ip address 10.90.40.1 255.255.255.0
 no shutdown
!
interface Ethernet1/0
 description MEDIA-X-YOKOHAMA-FOH
 ip address 10.90.41.1 255.255.255.0
 no shutdown
!
interface Ethernet1/1
 description MEDIA-X-HAMAMATSU-MOCAP
 ip address 10.90.42.1 255.255.255.0
 no shutdown
!
router ospf 290
 router-id 10.90.0.41
 passive-interface default
 no passive-interface Ethernet0/1
 no passive-interface Ethernet0/2
 network 10.90.0.41 0.0.0.0 area 0
 network 10.90.10.20 0.0.0.3 area 0
 network 10.90.10.24 0.0.0.3 area 0
 network 10.90.40.0 0.0.0.255 area 0
 network 10.90.41.0 0.0.0.255 area 0
 network 10.90.42.0 0.0.0.255 area 0
!
line vty 0 4
 exec-timeout 10 0
 transport input none
!
end
