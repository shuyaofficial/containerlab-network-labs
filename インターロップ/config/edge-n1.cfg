hostname edge-n1
no ip domain-lookup
service timestamps debug datetime msec
service timestamps log datetime msec
!
interface Loopback0
 description AS290-edge-n1
 ip address 10.90.0.11 255.255.255.255
!
interface Ethernet0/1
 description eBGP-TO-ext-bbix
 ip address 198.51.100.2 255.255.255.252
 no shutdown
!
interface Ethernet0/2
 description TO-core-n3a
 ip address 10.90.10.1 255.255.255.252
 no shutdown
!
interface Ethernet0/3
 description TO-core-n3b
 ip address 10.90.10.5 255.255.255.252
 no shutdown
!
ip route 10.90.0.0 255.255.0.0 Null0 250
!
router ospf 290
 router-id 10.90.0.11
 passive-interface default
 no passive-interface Ethernet0/2
 no passive-interface Ethernet0/3
 network 10.90.0.11 0.0.0.0 area 0
 network 10.90.10.0 0.0.0.3 area 0
 network 10.90.10.4 0.0.0.3 area 0
 default-information originate
!
router bgp 290
 bgp log-neighbor-changes
 network 10.90.0.0 mask 255.255.0.0
 neighbor 198.51.100.1 remote-as 65010
 neighbor 198.51.100.1 description EXT-BBIX
 neighbor 10.90.0.12 remote-as 290
 neighbor 10.90.0.12 description iBGP-edge-n2
 neighbor 10.90.0.12 update-source Loopback0
 neighbor 10.90.0.12 next-hop-self
!
line vty 0 4
 exec-timeout 10 0
 transport input none
!
end
