hostname remote-s5
no ip domain-lookup
service timestamps debug datetime msec
service timestamps log datetime msec
!
interface Loopback0
 description SECURE-REMOTE-ACCESS-S5
 ip address 10.90.0.55 255.255.255.255
!
interface Ethernet0/1
 description TO-sec-s4
 ip address 10.90.50.6 255.255.255.252
 no shutdown
!
router ospf 290
 router-id 10.90.0.55
 passive-interface default
 no passive-interface Ethernet0/1
 network 10.90.0.55 0.0.0.0 area 0
 network 10.90.50.4 0.0.0.3 area 0
!
line vty 0 4
 exec-timeout 10 0
 transport input none
!
end
