hostname hq-core
!
! hq-core — Cisco IOL 15.7.3M2 / HQキャンパスコア / AS65011
! OSPF(area0: hq-edge/hq-sw)と eBGP(dc-leaf1/2)の境界＝再配信ポイント。
! IOLはSSH不可・console運用のため aaa/ssh 設定は入れない。
! clab eth割当: eth1=Et0/1 / eth2=Et0/2 / eth3=Et0/3 / eth4=Et1/0
!
no ip domain lookup
ip cef
!
interface Ethernet0/1
 description to-hq-edge
 ip address 10.50.255.18 255.255.255.252
 no shutdown
!
interface Ethernet0/2
 description to-dc-leaf1
 ip address 10.50.255.21 255.255.255.252
 no shutdown
!
interface Ethernet0/3
 description to-dc-leaf2
 ip address 10.50.255.25 255.255.255.252
 no shutdown
!
interface Ethernet1/0
 description to-hq-sw
 ip address 10.50.255.29 255.255.255.252
 no shutdown
!
! OSPF: hq-edge/hq-sw と area0。DCから eBGP で学んだ /24 を OSPF へ再配信し
! HQ内(hq-sw/hq-edge)へ伝える。DC向け /30(Et0/2,Et0/3)は OSPF に載せない。
router ospf 1
 router-id 10.50.255.102
 redistribute bgp 65011 subnets
 network 10.50.255.16 0.0.0.3 area 0
 network 10.50.255.28 0.0.0.3 area 0
!
! eBGP: 両 DC リーフへ default-originate のみ（DCの復路はdefault→hq-core）。
! DCの /24 は上の redistribute で OSPF 側へ流す。
router bgp 65011
 bgp router-id 10.50.255.102
 bgp log-neighbor-changes
 neighbor 10.50.255.22 remote-as 65021
 neighbor 10.50.255.26 remote-as 65022
 !
 address-family ipv4
  neighbor 10.50.255.22 activate
  neighbor 10.50.255.22 default-originate
  neighbor 10.50.255.26 activate
  neighbor 10.50.255.26 default-originate
 exit-address-family
!
end
