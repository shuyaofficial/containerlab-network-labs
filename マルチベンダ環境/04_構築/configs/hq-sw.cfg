hostname hq-sw
!
! hq-sw — Cisco IOL L2-advipservices-2017 / HQキャンパスSW / SVIゲートウェイ
! ip routing 有効 + VLAN10/20 SVI + OSPF area0 参加（23番ラボ実績のSVIルーティング方式）。
! hq-core向けアップリンクも「専用トランジットVLAN99 + SVI」で L3 化し、
! L2イメージでも確実に動くよう物理ルーテッドポート(no switchport)を避ける。
! IOLはSSH不可・console運用のため aaa/ssh 設定は入れない。
! clab eth割当: eth1=Et0/1(uplink) / eth2=Et0/2(VLAN10) / eth3=Et0/3(VLAN20)
!
no ip domain lookup
ip routing
!
vlan 10
 name HQ-VLAN10
!
vlan 20
 name HQ-VLAN20
!
vlan 99
 name TRANSIT-HQCORE
!
interface Vlan10
 description gw-vlan10
 ip address 10.50.10.1 255.255.255.0
 no shutdown
!
interface Vlan20
 description gw-vlan20
 ip address 10.50.20.1 255.255.255.0
 no shutdown
!
interface Vlan99
 description to-hq-core-routed
 ip address 10.50.255.30 255.255.255.252
 no shutdown
!
interface Ethernet0/1
 description to-hq-core
 switchport access vlan 99
 switchport mode access
 no shutdown
!
interface Ethernet0/2
 description to-hq-pc1-vlan10
 switchport access vlan 10
 switchport mode access
 no shutdown
!
interface Ethernet0/3
 description to-hq-pc2-vlan20
 switchport access vlan 20
 switchport mode access
 no shutdown
!
! OSPF: VLAN10/20 と hq-core向けトランジットを area0 で広報。
! 端末セグメント(Vlan10/20)は passive（OSPF hello を端末へ流さない）。
router ospf 1
 router-id 10.50.255.105
 passive-interface Vlan10
 passive-interface Vlan20
 network 10.50.10.0 0.0.0.255 area 0
 network 10.50.20.0 0.0.0.255 area 0
 network 10.50.255.28 0.0.0.3 area 0
!
end
