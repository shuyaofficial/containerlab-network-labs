frr version 10.2.1
frr defaults traditional
hostname isp-a
no ipv6 forwarding
!
! ===== インターフェース（zebra がIP付与） =====
interface lo
 ip address 198.51.100.1/32
!
interface eth1
 description to-isp-b
 ip address 10.50.255.1/30
!
interface eth2
 description to-hq-edge
 ip address 10.50.255.5/30
!
! ===== eBGP（AS65001） =====
router bgp 65001
 bgp router-id 198.51.100.1
 bgp log-neighbor-changes
 ! FRR 9+ の RFC8212 既定（eBGPはポリシー必須）を無効化。ラボ簡素化のため無条件広報。
 no bgp ebgp-requires-policy
 neighbor 10.50.255.2 remote-as 65002
 neighbor 10.50.255.2 description isp-b
 neighbor 10.50.255.6 remote-as 65010
 neighbor 10.50.255.6 description hq-edge
 !
 address-family ipv4 unicast
  ! 「インターネット上のサービス」役のループバック + 自ISPのP2Pセグメント
  network 198.51.100.1/32
  network 10.50.255.0/30
  network 10.50.255.4/30
  neighbor 10.50.255.2 activate
  neighbor 10.50.255.6 activate
 exit-address-family
!
line vty
!
