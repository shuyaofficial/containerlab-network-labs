frr version 10.2.1
frr defaults traditional
hostname isp-b
no ipv6 forwarding
!
! ===== インターフェース（zebra がIP付与） =====
interface lo
 ip address 198.51.100.2/32
!
interface eth1
 description to-isp-a
 ip address 10.50.255.2/30
!
interface eth2
 description to-hq-edge
 ip address 10.50.255.9/30
!
interface eth3
 description to-br-edge
 ip address 10.50.255.13/30
!
! ===== eBGP（AS65002） =====
router bgp 65002
 bgp router-id 198.51.100.2
 bgp log-neighbor-changes
 ! FRR 9+ の RFC8212 既定（eBGPはポリシー必須）を無効化。ラボ簡素化のため無条件広報。
 no bgp ebgp-requires-policy
 neighbor 10.50.255.1 remote-as 65001
 neighbor 10.50.255.1 description isp-a
 neighbor 10.50.255.10 remote-as 65010
 neighbor 10.50.255.10 description hq-edge
 !
 address-family ipv4 unicast
  ! ループバック + 自ISPのP2Pセグメント。
  ! 10.50.255.12/30（br-edge向け）はブランチNAT復路の到達性のため必須広報。
  network 198.51.100.2/32
  network 10.50.255.0/30
  network 10.50.255.8/30
  network 10.50.255.12/30
  neighbor 10.50.255.1 activate
  neighbor 10.50.255.10 activate
 exit-address-family
!
line vty
!
