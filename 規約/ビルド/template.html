<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>{{title}}</title>
  <link rel="stylesheet" href="{{assets}}/doc.css">
  <link rel="stylesheet" href="{{assets}}/highlight.css">
</head>
<body>
  <div class="layout">
    <article class="doc">
      <nav class="breadcrumb" aria-label="パンくずリスト">{{breadcrumb}}</nav>
      <h1 class="doc-title">{{title}}</h1>
      <div class="meta">
        {{status}}
        {{date}}
        {{tags}}
      </div>
      {{notice}}
      <div class="content">
{{content}}
      </div>
      <footer class="doc-footer">
        <span class="no-print">このHTMLは <code>規約/ビルド/build.mjs</code> による自動生成ビューです。ソースはMarkdown（手編集禁止）。</span>
      </footer>
    </article>
    <aside class="toc" aria-label="目次">
      <p class="toc-title">目次</p>
      {{toc}}
    </aside>
  </div>
  <script src="{{assets}}/mermaid.min.js"></script>
  <script>
    (function () {
      if (window.mermaid) {
        window.mermaid.initialize({
          startOnLoad: true,
          theme: "base",
          fontFamily: '"Hiragino Sans","Noto Sans JP",sans-serif',
          themeVariables: {
            primaryColor: "#e8f4f7",
            primaryBorderColor: "#087da8",
            primaryTextColor: "#17232d",
            lineColor: "#5c6b75",
            fontSize: "14px"
          }
        });
      }
      // TOC アクティブ連動（IntersectionObserver / モーション最小）
      var links = Array.prototype.slice.call(document.querySelectorAll(".toc a"));
      if (!links.length || !("IntersectionObserver" in window)) return;
      var map = {};
      links.forEach(function (a) {
        var id = decodeURIComponent(a.getAttribute("href").slice(1));
        map[id] = a;
      });
      var visible = new Set();
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) visible.add(e.target.id);
          else visible.delete(e.target.id);
        });
        var active = null;
        var heads = document.querySelectorAll(".content h2[id], .content h3[id]");
        for (var i = 0; i < heads.length; i++) {
          if (visible.has(heads[i].id)) { active = heads[i].id; break; }
        }
        links.forEach(function (a) { a.classList.remove("is-active"); });
        if (active && map[active]) map[active].classList.add("is-active");
      }, { rootMargin: "0px 0px -70% 0px", threshold: 0 });
      document.querySelectorAll(".content h2[id], .content h3[id]").forEach(function (h) { io.observe(h); });
    })();
  </script>
</body>
</html>
