! N1 NAC / 802.1X スイッチ設定（IOL L2-15.2 / IBNS 1.0）
! RADIUS は データポート Et0/3 経由・管理VLAN100 の SVI で到達する
! 認証成功 → 業務VLAN10、未認証(応答なし) → 隔離VLAN99
aaa new-model
aaa authentication dot1x default group radius
aaa authorization network default group radius
dot1x system-auth-control
radius server RAD
 address ipv4 172.31.0.10 auth-port 1812 acct-port 1813
 key radlab123
 exit
vlan 10
 name BUSINESS
 exit
vlan 99
 name QUARANTINE
 exit
vlan 100
 name MGMT
 exit
interface Vlan100
 ip address 172.31.0.1 255.255.255.0
 no shutdown
 exit
ip radius source-interface Vlan100
interface Ethernet0/3
 switchport mode access
 switchport access vlan 100
 exit
interface Ethernet0/1
 switchport mode access
 authentication port-control auto
 authentication event no-response action authorize vlan 99
 dot1x pae authenticator
 dot1x timeout tx-period 10
 dot1x max-reauth-req 2
 spanning-tree portfast
 exit
interface Ethernet0/2
 switchport mode access
 authentication port-control auto
 authentication event no-response action authorize vlan 99
 dot1x pae authenticator
 dot1x timeout tx-period 10
 dot1x max-reauth-req 2
 spanning-tree portfast
 exit
