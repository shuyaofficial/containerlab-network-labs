name: dynamic-routing-lab

mgmt:
  network: dynamic-routing-mgmt
  ipv4-subnet: 172.26.26.0/24

topology:
  kinds:
    cisco_iol:
      image: vrnetlab/cisco_iol:15.7.3M2
      env:
        IOL_MEMORY: "1024"

  nodes:
    hq-core:
      kind: cisco_iol
      mgmt-ipv4: 172.26.26.11
      binds:
        - ./entrypoint_attach.sh:/entrypoint.sh:ro
    hq-dist:
      kind: cisco_iol
      mgmt-ipv4: 172.26.26.12
      binds:
        - ./entrypoint_attach.sh:/entrypoint.sh:ro
    hq-edge:
      kind: cisco_iol
      mgmt-ipv4: 172.26.26.13
      binds:
        - ./entrypoint_attach.sh:/entrypoint.sh:ro
    hq-dmz:
      kind: cisco_iol
      mgmt-ipv4: 172.26.26.14
      binds:
        - ./entrypoint_attach.sh:/entrypoint.sh:ro

    br-core:
      kind: cisco_iol
      mgmt-ipv4: 172.26.26.21
      binds:
        - ./entrypoint_attach.sh:/entrypoint.sh:ro
    br-edge:
      kind: cisco_iol
      mgmt-ipv4: 172.26.26.22
      binds:
        - ./entrypoint_attach.sh:/entrypoint.sh:ro

    isp:
      kind: cisco_iol
      mgmt-ipv4: 172.26.26.100
      binds:
        - ./entrypoint_attach.sh:/entrypoint.sh:ro

    hq-pc:
      kind: linux
      image: wbitt/network-multitool:latest
      mgmt-ipv4: 172.26.26.101
      exec:
        - ip link set eth1 up
        - ip address add 10.26.10.10/24 dev eth1
        - ip route add default via 10.26.10.1 dev eth1
    br-pc:
      kind: linux
      image: wbitt/network-multitool:latest
      mgmt-ipv4: 172.26.26.102
      exec:
        - ip link set eth1 up
        - ip address add 10.26.20.10/24 dev eth1
        - ip route add default via 10.26.20.1 dev eth1
    dmz-srv:
      kind: linux
      image: wbitt/network-multitool:latest
      mgmt-ipv4: 172.26.26.103
      exec:
        - ip link set eth1 up
        - ip address add 10.26.30.10/24 dev eth1
        - ip route add default via 10.26.30.1 dev eth1

  links:
    # HQ Core to Distribution
    - endpoints: ["hq-core:eth1", "hq-dist:eth1"]
    # HQ Core to Edge
    - endpoints: ["hq-core:eth2", "hq-edge:eth1"]
    # HQ Core to DMZ
    - endpoints: ["hq-core:eth3", "hq-dmz:eth1"]
    
    # WAN / ISP Links
    - endpoints: ["hq-edge:eth2", "isp:eth1"]
    - endpoints: ["isp:eth2", "br-edge:eth1"]
    
    # Branch Edge to Core
    - endpoints: ["br-edge:eth2", "br-core:eth1"]
    
    # Endpoints
    - endpoints: ["hq-dist:eth2", "hq-pc:eth1"]
    - endpoints: ["hq-dmz:eth2", "dmz-srv:eth1"]
    - endpoints: ["br-core:eth2", "br-pc:eth1"]
