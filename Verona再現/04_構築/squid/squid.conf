# Verona再現: SWG（URLフィルタリング）— Squid 明示プロキシ設定
#
# Verona p40「URLフィルタリング（SWG）」の思想を簡略再現する:
#   実際のVeronaは91カテゴリの分類データベースに基づき安全/疑わしい/危険サイトを判定するが、
#   本ラボはOSSで91カテゴリDBを持たないため、単一の共有ブロックリスト（blocklist.txt）による
#   dstdomain ACL で「ブラックリスト方式のURLフィルタ」のみを再現する（△簡略化、詳細は
#   ../../02_基本設計/網屋Verona_OSS対応表.md 参照）。
#
# blocklist.txt は Blocky（DNSフィルタ）と共用し、URL層とDNS層の二重防御（p40-42）を体現する。
# 名前解決は Blocky に委譲する（deploy.sh の `--dns` オプション）。ブロック対象ドメインは
# ACL 段階で拒否するため、そもそも名前解決が発生しない（＝DNSが効かなくてもURL層で止まる）。

visible_hostname verona-squid

acl localnet src 172.60.0.0/16

acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 21
acl Safe_ports port 443
acl Safe_ports port 1025-65535
acl CONNECT method CONNECT

# 共有ブロックリスト（Verona DNSセキュリティ3段階カテゴリの思想を簡略再現。
# ../../03_詳細設計/パラメータシート.md にドメイン一覧の説明あり）
acl blocklist dstdomain "/etc/squid/blocklist.txt"

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# URLフィルタ本体: ブロックリスト一致は問答無用で拒否（403）
http_access deny blocklist

http_access allow localnet
http_access allow localhost
http_access deny all

http_port 3128

coredump_dir /var/spool/squid
