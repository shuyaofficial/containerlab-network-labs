<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Premium Interactive Topology - Failover Scenarios</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
  
  body { 
    margin: 0; padding: 0; font-family: 'Inter', sans-serif; 
    background: #0f172a; color: #cbd5e1; display: flex; height: 100vh; overflow: hidden; 
  }
  
  /* Sidebar Styling */
  #sidebar { 
    width: 400px; background: rgba(30, 41, 59, 0.95); padding: 30px; 
    box-shadow: 5px 0 20px rgba(0,0,0,0.6);
    display: flex; flex-direction: column; z-index: 100;
    backdrop-filter: blur(10px);
  }
  h1 { font-size: 22px; color: #f8fafc; margin-bottom: 25px; border-bottom: 2px solid #334155; padding-bottom: 15px; font-weight: 800; letter-spacing: 0.5px;}
  
  .btn { 
    background: #1e293b; color: #f8fafc; border: 1px solid #475569; padding: 16px; margin-bottom: 12px;
    border-radius: 10px; cursor: pointer; text-align: left; font-size: 15px; font-weight: 600;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex; align-items: center;
  }
  .btn:hover { background: #334155; transform: translateX(5px); }
  .btn.active { 
    background: linear-gradient(135deg, #2563eb, #3b82f6); border-color: #60a5fa; 
    box-shadow: 0 4px 15px rgba(59,130,246,0.4); 
  }
  
  #info-panel {
    margin-top: auto; background: #0f172a; padding: 25px; border-radius: 12px; border: 1px solid #334155;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
  }
  #info-panel h2 { margin-top: 0; color: #60a5fa; font-size: 19px; font-weight: 800; }
  #info-panel p { line-height: 1.7; font-size: 14px; color: #94a3b8; margin-bottom: 0; }
  #info-panel b { color: #e2e8f0; }
  
  /* Canvas Styling */
  #canvas-container { 
    flex: 1; display: flex; justify-content: center; align-items: center; position: relative;
    background-image: radial-gradient(circle at center, #334155 1px, transparent 1px);
    background-size: 40px 40px;
  }
  #diagram { position: relative; width: 800px; height: 750px; }
  
  /* Nodes (Glassmorphism + Gradients) */
  .node {
    position: absolute; width: 110px; height: 75px;
    background: linear-gradient(135deg, #1e3a8a, #2563eb); border: 2px solid #60a5fa; border-radius: 14px;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    color: white; font-weight: 600; font-size: 13px; z-index: 10;
    box-shadow: 0 10px 20px -5px rgba(0,0,0,0.6);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .node svg { width: 28px; height: 28px; fill: white; margin-bottom: 6px; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));}
  
  /* Node States */
  .node.error { background: linear-gradient(135deg, #7f1d1d, #dc2626); border-color: #fca5a5; box-shadow: 0 0 25px rgba(220,38,38,0.7); transform: scale(1.05); }
  .node.standby { background: linear-gradient(135deg, #334155, #475569); border-color: #94a3b8; opacity: 0.7; }
  
  /* SVG Lines */
  #svg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
  .standby-line { stroke: #334155; stroke-width: 4; fill: none; transition: all 0.4s ease; stroke-linecap: round;}
  
  /* Flow Animation */
  .flow { 
    stroke: #10b981; stroke-width: 6; fill: none; stroke-linecap: round;
    stroke-dasharray: 15, 15; animation: flowAnim 0.7s linear infinite; 
    filter: drop-shadow(0 0 8px rgba(16,185,129,0.8)); 
  }
  .error-line { stroke: #ef4444; stroke-width: 6; fill: none; stroke-dasharray: 8, 8; stroke-linecap: round; opacity: 0.6; }
  
  @keyframes flowAnim { from { stroke-dashoffset: 30; } to { stroke-dashoffset: 0; } }
  
  /* Specific adjust for text */
  .node-text { text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
</style>
</head>
<body>

<div id="sidebar">
  <h1>プレミアム図解<br><span style="color: #60a5fa; font-size: 16px;">エンタープライズ・フェイルオーバー</span></h1>
  
  <button class="btn" onclick="renderScenario(0)">✅ 正常時 (Normal)</button>
  <button class="btn" onclick="renderScenario(1)">🔴 WAN障害 (たすき掛け迂回)</button>
  <button class="btn" onclick="renderScenario(2)">🔴 コア障害 (HSRP切替)</button>
  <button class="btn" onclick="renderScenario(3)">🔴 LAG断線 (EtherChannel)</button>
  
  <div id="info-panel">
    <h2 id="desc-title">選択してください</h2>
    <p id="desc-text">上のボタンをクリックすると、トラフィックの経路アニメーションが表示されます。</p>
  </div>
</div>

<div id="canvas-container">
  <div id="diagram">
    <svg id="svg-layer">
      <!-- ISP to Branches -->
      <line id="l-isp-br" x1="450" y1="100" x2="150" y2="250" class="standby-line" />
      <line id="l-br-pc" x1="150" y1="250" x2="150" y2="500" class="standby-line" />
      
      <!-- ISP to HQ Edge -->
      <line id="l-isp-hq1" x1="450" y1="100" x2="350" y2="250" class="standby-line" />
      <line id="l-isp-hq2" x1="450" y1="100" x2="550" y2="250" class="standby-line" />
      
      <!-- Edge to Core -->
      <line id="l-hq1-c1" x1="350" y1="250" x2="350" y2="450" class="standby-line" />
      <line id="l-hq1-c2" x1="350" y1="250" x2="550" y2="450" class="standby-line" />
      <line id="l-hq2-c1" x1="550" y1="250" x2="350" y2="450" class="standby-line" />
      <line id="l-hq2-c2" x1="550" y1="250" x2="550" y2="450" class="standby-line" />
      
      <!-- Core to Core (LAG) - Curved paths -->
      <path id="l-c1-c2-a" d="M 350 450 Q 450 420 550 450" class="standby-line" />
      <path id="l-c1-c2-b" d="M 350 450 Q 450 480 550 450" class="standby-line" />
      
      <!-- Core to PC -->
      <line id="l-c1-pc" x1="350" y1="450" x2="450" y2="650" class="standby-line" />
    </svg>
    
    <!-- Icons (Embedded SVG for Cisco Router style cross-arrows) -->
    <defs style="display:none;">
      <svg id="icon-router" viewBox="0 0 24 24"><path d="M22 12l-4-4v3h-5V6h3L12 2 8 6h3v5H6V8L2 12l4 4v-3h5v5H8l4 4 4-4h-3v-5h5v3z"/></svg>
      <svg id="icon-pc" viewBox="0 0 24 24"><path d="M20 18c1.1 0 1.99-.9 1.99-2L22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z"/></svg>
    </defs>
    
    <!-- Nodes positioned to match user's physical topology image exactly -->
    <div class="node" id="n-isp" style="left: 395px; top: 62px;">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      <span class="node-text">isp</span>
    </div>
    
    <div class="node" id="n-br-edge" style="left: 95px; top: 212px;">
      <svg><use href="#icon-router"></use></svg><span class="node-text">br-edge</span>
    </div>
    <div class="node" id="n-br-pc" style="left: 95px; top: 462px;">
      <svg><use href="#icon-pc"></use></svg><span class="node-text">br-pc</span>
    </div>
    
    <div class="node" id="n-hq1" style="left: 295px; top: 212px;">
      <svg><use href="#icon-router"></use></svg><span class="node-text">hq-edge1</span>
    </div>
    <div class="node" id="n-hq2" style="left: 495px; top: 212px;">
      <svg><use href="#icon-router"></use></svg><span class="node-text">hq-edge2</span>
    </div>
    
    <div class="node" id="n-c1" style="left: 295px; top: 412px;">
      <svg><use href="#icon-router"></use></svg><span class="node-text">hq-core1</span>
    </div>
    <div class="node" id="n-c2" style="left: 495px; top: 412px;">
      <svg><use href="#icon-router"></use></svg><span class="node-text">hq-core2</span>
    </div>
    
    <div class="node" id="n-pc" style="left: 395px; top: 612px;">
      <svg><use href="#icon-pc"></use></svg><span class="node-text">hq-pc-sales</span>
    </div>
  </div>
</div>

<script>
const scenarios = [
  {
    title: '🟢 正常時（Normal State）',
    desc: '平時はHQ-Core1がActiveとなり、最短ルートであるHQ-Edge1経由でISPへ通信します。<br><br><b>経路:</b> PC → Core1 → Edge1 → ISP<br><b>LAG:</b> 平時はトラフィックは通過しません。',
    links: { 'l-isp-hq1': 'flow', 'l-hq1-c1': 'flow', 'l-c1-pc': 'flow' },
    nodes: {}
  },
  {
    title: '🔴 WAN障害（たすき掛け切替）',
    desc: 'HQ-Edge1のWANリンクがダウンした状態。<br>OSPFが迂回ルートを計算し、HQ-Core1は「クロスリンク」を使ってHQ-Edge2へトラフィックを即座に横流しします。<br><br><b>経路:</b> PC → Core1 → Edge2 → ISP',
    links: {
      'l-isp-hq1': 'error', 'l-hq1-c1': 'standby', 'l-c1-pc': 'flow',
      'l-hq2-c1': 'flow', 'l-isp-hq2': 'flow'
    },
    nodes: { 'n-hq1': 'error' }
  },
  {
    title: '🔴 コア障害（HSRP切替）',
    desc: 'HQ-Core1のSVI（ルーティング機能）がダウンした状態。<br>HSRPのActiveがHQ-Core2に切り替わります。パケットはL2機能としてCore1を通過し、LAGを経由してCore2でルーティングされます。<br><br><b>経路:</b> PC → Core1(L2) → [LAG] → Core2(L3) → Edge1 → ISP',
    links: {
      'l-c1-pc': 'flow', 'l-c1-c2-a': 'flow', 'l-hq1-c2': 'flow', 'l-isp-hq1': 'flow'
    },
    nodes: { 'n-c1': 'error' }
  },
  {
    title: '🔴 コア間リンク障害（LAG断線）',
    desc: 'Core1-Core2間のLAG（Port-channel）の1本が物理切断された状態。<br>※アーキテクチャ上、PCからインターネットへの通常トラフィック（緑の線）はLAGを通らないため一切影響を受けません。<br><br><b>経路:</b> PC → Core1 → Edge1 → ISP',
    links: {
      'l-isp-hq1': 'flow', 'l-hq1-c1': 'flow', 'l-c1-pc': 'flow',
      'l-c1-c2-a': 'error'
    },
    nodes: {}
  }
];

function renderScenario(index) {
  // Reset all lines
  document.querySelectorAll('line, path').forEach(el => {
    el.setAttribute('class', 'standby-line');
  });
  // Reset all nodes
  document.querySelectorAll('.node').forEach(el => {
    el.classList.remove('error');
  });
  // Update UI buttons
  document.querySelectorAll('.btn').forEach((el, i) => {
    el.classList.toggle('active', i === index);
  });
  
  // Update description
  const sc = scenarios[index];
  document.getElementById('desc-title').innerHTML = sc.title;
  document.getElementById('desc-text').innerHTML = sc.desc;
  
  // Apply visual states based on scenario data
  for (const [id, state] of Object.entries(sc.links)) {
    const el = document.getElementById(id);
    if(el) {
      if(state === 'flow') el.setAttribute('class', 'flow');
      else if(state === 'error') el.setAttribute('class', 'error-line');
    }
  }
  
  for (const [id, state] of Object.entries(sc.nodes)) {
    const el = document.getElementById(id);
    if(el && state === 'error') el.classList.add('error');
  }
}

// Initialize first scenario on load
window.onload = () => renderScenario(0);
</script>

</body>
</html>
