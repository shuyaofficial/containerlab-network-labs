# backend: nginx で / と /admin の 2 パスを持つ（L7 ポリシー適用前は両方 200）。
# frontend / other: multitool（curl 可能）を sleep 常駐。
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-nginx-conf
  namespace: microseg
data:
  default.conf: |
    server {
      listen 80;
      server_name _;
      location = / {
        add_header Content-Type text/plain;
        return 200 "backend-root-ok\n";
      }
      location = /admin {
        add_header Content-Type text/plain;
        return 200 "backend-admin-ok\n";
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: microseg
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: conf
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: conf
          configMap:
            name: backend-nginx-conf
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: microseg
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: microseg
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: client
          image: wbitt/network-multitool:latest
          command: ["sleep", "infinity"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: other
  namespace: microseg
  labels:
    app: other
spec:
  replicas: 1
  selector:
    matchLabels:
      app: other
  template:
    metadata:
      labels:
        app: other
    spec:
      containers:
        - name: client
          image: wbitt/network-multitool:latest
          command: ["sleep", "infinity"]
