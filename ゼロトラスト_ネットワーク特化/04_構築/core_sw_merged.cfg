! ゼロトラスト_ネットワーク特化 統合コアSW (IOL L2-advipservices-2017)
! N1(802.1X 動的VLAN) + N4(L3 SVI + inter-VLAN ACL) を単一IOLに統合
! - 認証成功(alice) → 業務VLAN10、未認証(応答なし) → 隔離VLAN99
! - 営業VLAN10 → サーバ室VLAN50 の inter-VLAN は SEG10-OUT で tcp/80のみ許可・22拒否
aaa new-model
aaa authentication dot1x default group radius
aaa authorization network default group radius
dot1x system-auth-control
ip routing
radius server RAD
 address ipv4 172.31.0.10 auth-port 1812 acct-port 1813
 key radlab123
 exit
vlan 10
 name SALES
 exit
vlan 20
 name DEV
 exit
vlan 30
 name GUEST
 exit
vlan 50
 name SERVER
 exit
vlan 99
 name QUARANTINE
 exit
vlan 100
 name MGMT
 exit
interface Vlan10
 ip address 172.31.10.1 255.255.255.0
 ip access-group SEG10-OUT in
 no shutdown
 exit
interface Vlan20
 ip address 172.31.20.1 255.255.255.0
 no shutdown
 exit
interface Vlan30
 ip address 172.31.30.1 255.255.255.0
 no shutdown
 exit
interface Vlan50
 ip address 172.31.50.1 255.255.255.0
 no shutdown
 exit
interface Vlan99
 ip address 172.31.99.1 255.255.255.0
 no shutdown
 exit
interface Vlan100
 ip address 172.31.0.1 255.255.255.0
 no shutdown
 exit
ip radius source-interface Vlan100
interface Ethernet0/1
 switchport mode access
 authentication port-control auto
 authentication event no-response action authorize vlan 99
 dot1x pae authenticator
 dot1x timeout tx-period 10
 dot1x max-reauth-req 2
 spanning-tree portfast
 exit
interface Ethernet0/2
 switchport mode access
 switchport access vlan 20
 spanning-tree portfast
 exit
interface Ethernet0/3
 switchport mode access
 switchport access vlan 30
 spanning-tree portfast
 exit
interface Ethernet1/0
 switchport mode access
 authentication port-control auto
 authentication event no-response action authorize vlan 99
 dot1x pae authenticator
 dot1x timeout tx-period 10
 dot1x max-reauth-req 2
 spanning-tree portfast
 exit
interface Ethernet1/1
 switchport mode access
 switchport access vlan 100
 exit
interface Ethernet1/2
 switchport mode access
 switchport access vlan 50
 exit
ip access-list extended SEG10-OUT
 permit tcp 172.31.10.0 0.0.0.255 host 172.31.50.11 eq 80
 permit icmp 172.31.10.0 0.0.0.255 172.31.50.0 0.0.0.255
 deny tcp 172.31.10.0 0.0.0.255 host 172.31.50.11 eq 22
 permit ip any any
 exit
