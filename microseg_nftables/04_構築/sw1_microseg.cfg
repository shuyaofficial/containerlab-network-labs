! N4 マイクロセグメンテーション スイッチ設定（IOL L2-advipservices-2017 / L3 SVI + inter-VLAN ACL）
! 層1: VLAN10(pc10a/pc10b) から VLAN20(srv20) への到達を tcp/80 のみ許可、他は拒否
ip routing
vlan 10
 name SEG10
 exit
vlan 20
 name SEG20
 exit
interface Vlan10
 ip address 172.50.10.1 255.255.255.0
 ip access-group SEG10-OUT in
 no shutdown
 exit
interface Vlan20
 ip address 172.50.20.1 255.255.255.0
 no shutdown
 exit
interface Ethernet0/1
 switchport mode access
 switchport access vlan 10
 exit
interface Ethernet0/2
 switchport mode access
 switchport access vlan 10
 exit
interface Ethernet0/3
 switchport mode access
 switchport access vlan 20
 exit
ip access-list extended SEG10-OUT
 permit tcp 172.50.10.0 0.0.0.255 host 172.50.20.11 eq 80
 permit icmp 172.50.10.0 0.0.0.255 172.50.20.0 0.0.0.255
 deny tcp 172.50.10.0 0.0.0.255 host 172.50.20.11 eq 22
 permit ip any any
 exit
