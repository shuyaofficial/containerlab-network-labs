name: cisco-bgp-dual-homed

topology:
  kinds:
    cisco_iol:
      image: vrnetlab/cisco_iol:15.6.3M3a
  nodes:
    isp-a:
      kind: cisco_iol
    isp-b:
      kind: cisco_iol
    r1:
      kind: cisco_iol
    r2:
      kind: cisco_iol
    r3:
      kind: cisco_iol
  links:
    - endpoints: ["isp-a:Ethernet0/1", "r1:Ethernet0/1"]
    - endpoints: ["isp-b:Ethernet0/1", "r2:Ethernet0/1"]
    - endpoints: ["r1:Ethernet0/2", "r2:Ethernet0/2"]
    - endpoints: ["r1:Ethernet0/3", "r3:Ethernet0/1"]
    - endpoints: ["r2:Ethernet0/3", "r3:Ethernet0/2"]
